spring:
  application:
    name: Loan-Backend
  datasource:
    url: jdbc:h2:file:./data/mydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  cloud:
    stream:
      default-binder: kafka
      kafka:
        binder:
          auto-create-topics: true
          brokers: ${KAFKA_BOOTSTRAP_SERVER:localhost:9092}
      bindings:
          loan-notifications-out-0:
            destination: loan-notifications

loan:
  integration:
    stub: false
    customer-service-base-url: http://localhost:8081
    customer-by-id-path: /api/v1/customers/{id}
    product-service-base-url: http://localhost:8082
    product-by-id-path: /api/v1/products/{id}
  sweep:
    overdue-cron: "0 0 2 * * *"
    daily-fee-cron: "0 15 2 * * *"
    writeoff-cron: "0 30 3 * * SUN"
    writeoff-days-after-due: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
logging:
  level:
    org.apache.kafka: ERROR
    org.springframework.kafka: ERROR