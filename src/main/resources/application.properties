spring.application.name=Loan-Backend

# Default: in-memory H2; schema is created/updated by JPA.
spring.datasource.url=jdbc:h2:mem:loandb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# --- Remote Customer / Product services (HTTP) ---
loan.integration.stub=false
loan.integration.customer-service-base-url=http://localhost:8081
loan.integration.customer-by-id-path=/api/v1/customers/{id}
loan.integration.product-service-base-url=http://localhost:8082
loan.integration.product-by-id-path=/api/v1/products/{id}

# Set to true for local tests without Customer/Product services (see README).
# loan.integration.stub=true

# --- Kafka: events for Notification service ---
spring.kafka.bootstrap-servers=localhost:9092
loan.notifications.enabled=true
loan.notifications.topic=loan.notifications

# Scheduled sweeps
loan.sweep.overdue-cron=0 0 2 * * *
loan.sweep.daily-fee-cron=0 15 2 * * *
loan.sweep.writeoff-cron=0 30 3 * * SUN
loan.sweep.writeoff-days-after-due=120

management.endpoints.web.exposure.include=health,info
